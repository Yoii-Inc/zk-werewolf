[package]
name = "arkworks-solidity-verifier"
version = "0.1.0"
edition = "2021"
readme = "README.md"
repository = "https://github.com/Tetration-Lab/arkworks-solidity-verifier"
keywords = ["verifier", "solidity", "zk-snarks", "zero-knowledge", "crypto"]
description = "Solidity SNARK verifier generator for Arkwork's proof systems."
license = "LGPL-3.0-only"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Proving Schemes
ark-groth16 = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-groth16", version = "0.3.0", default-features = false }
ark-marlin = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-marlin", version = "0.3.0", default-features = false }

# Parings
ark-bn254 = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-bn254", version = "0.3.0", default-features = false, features = ["curve"] }

ark-snark = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-snark", version = "0.3.0", default-features = false }
ark-ff = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-ff", version = "0.3.0", default-features = false }
ark-ec = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-ec", version = "0.3.0", default-features = false }
ark-serialize = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-serialize", version = "0.3.0", default-features = false }
ark-poly = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-poly", version = "0.3.0", default-features = false }
ark-poly-commit = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-poly-commit", version = "0.3.0", features = ["std"] }
ark-relations = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-relations", version = "0.3.0", default-features = false }
ark-r1cs-std = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-r1cs-std", version = "0.3.0", default-features = false }
ark-std = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-std", version = "0.3.0", default-features = false }
ark-crypto-primitives = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "ark-crypto-primitives", version = "0.3.0", default-features = false }
zk-mpc = { git = "https://github.com/Yoii-Inc/zk-mpc.git" }
mpc-algebra = { git = "https://github.com/Yoii-Inc/zk-mpc.git", package = "mpc-algebra", version = "0.1.0" }

digest = "0.9"
regex = "1.7.1"
hex = "0.4.3"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
blake2 = { version = "0.9", default-features = false }
sha3 = { version = "0.9", default-features = false }
nalgebra = { version = "0.33.0", features = ["serde-serialize"] }
mpc-circuits = { path = "../mpc-circuits" }
mpc-algebra-wasm = { path = "../mpc-algebra-wasm" }

[dev-dependencies]
blake2 = { version = "0.9", default-features = false }
