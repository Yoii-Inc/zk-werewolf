name: Release (Contracts + AWS)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - dev
          - staging
          - prod
      network:
        description: "Foundry network key"
        required: true
        default: "sepolia"
        type: choice
        options:
          - sepolia
      service:
        description: "AWS service scope"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend
          - mpc-node
      verify_contracts:
        description: "Verify contracts on explorer"
        required: true
        default: true
        type: boolean
      skip_contract_deploy:
        description: "Skip on-chain contract deployment"
        required: true
        default: false
        type: boolean
      skip_terraform:
        description: "Skip Terraform apply for AWS deploy"
        required: true
        default: false
        type: boolean
      skip_aws_deploy:
        description: "Skip AWS deploy"
        required: true
        default: false
        type: boolean

env:
  AWS_REGION: ap-northeast-1
  ENVIRONMENT: ${{ github.event.inputs.environment }}
  NETWORK: ${{ github.event.inputs.network }}
  SERVICE: ${{ github.event.inputs.service }}

permissions:
  id-token: write
  contents: read

concurrency:
  group: release-${{ github.event.inputs.environment }}-${{ github.event.inputs.network }}
  cancel-in-progress: false

jobs:
  prepare-groth16:
    name: Prepare Groth16 Artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Generate Groth16 artifacts
        run: |
          set -euo pipefail
          make groth16-setup
          make groth16-export-verifier

      - name: Generate checksum summary
        run: |
          set -euo pipefail
          sha256sum packages/zk-mpc-node/data/groth16/*.pk > /tmp/groth16-pk.sha256
          sha256sum packages/foundry/contracts/verifiers/*Groth16Verifier.sol > /tmp/groth16-verifier.sha256
          {
            echo "## Groth16 Artifacts"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Environment: \`${ENVIRONMENT}\`"
            echo "- Network: \`${NETWORK}\`"
            echo ""
            echo "### PK Checksums"
            echo "\`\`\`"
            cat /tmp/groth16-pk.sha256
            echo "\`\`\`"
            echo "### Verifier Checksums"
            echo "\`\`\`"
            cat /tmp/groth16-verifier.sha256
            echo "\`\`\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Set artifact metadata
        id: meta
        run: echo "artifact_name=groth16-artifacts-${GITHUB_RUN_ID}" >> "${GITHUB_OUTPUT}"

      - name: Upload Groth16 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            packages/zk-mpc-node/data/groth16/*.pk
            packages/zk-mpc-node/data/groth16/*.json
            packages/foundry/contracts/verifiers/*Groth16Verifier.sol

  deploy-contracts:
    name: Deploy Contracts
    runs-on: ubuntu-latest
    needs: [prepare-groth16]
    if: ${{ github.event.inputs.skip_contract_deploy != 'true' }}
    environment: ${{ github.event.inputs.environment }}
    defaults:
      run:
        working-directory: packages/foundry
    env:
      VERIFY_ENABLED: ${{ github.event.inputs.verify_contracts }}
      ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Groth16 artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare-groth16.outputs.artifact_name }}
          path: .

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [[ -z "${ALCHEMY_API_KEY}" ]]; then
            echo "::error::Missing secret ALCHEMY_API_KEY"
            exit 1
          fi
          if [[ -z "${DEPLOYER_PRIVATE_KEY}" ]]; then
            echo "::error::Missing secret DEPLOYER_PRIVATE_KEY"
            exit 1
          fi
          if [[ "${VERIFY_ENABLED}" == "true" && -z "${ETHERSCAN_API_KEY}" ]]; then
            echo "::error::Missing secret ETHERSCAN_API_KEY (required when verify_contracts=true)"
            exit 1
          fi

      - name: Deploy contracts
        run: |
          set -euo pipefail
          ARGS=(
            script
            "script/DeployWerewolf.s.sol:DeployWerewolf"
            --rpc-url "${NETWORK}"
            --broadcast
            --legacy
            --ffi
            --private-key "${DEPLOYER_PRIVATE_KEY}"
          )

          if [[ "${VERIFY_ENABLED}" == "true" ]]; then
            ARGS+=(--verify --etherscan-api-key "${ETHERSCAN_API_KEY}")
          fi

          forge "${ARGS[@]}"

      - name: Summarize contract deployment
        run: |
          set -euo pipefail
          CHAIN_ID="$(cast chain-id --rpc-url "${NETWORK}")"
          BROADCAST_FILE="broadcast/DeployWerewolf.s.sol/${CHAIN_ID}/run-latest.json"

          if [[ ! -f "${BROADCAST_FILE}" ]]; then
            echo "::error::Deployment broadcast file not found: ${BROADCAST_FILE}"
            exit 1
          fi

          CREATE_COUNT="$(jq '[.transactions[] | select(.transactionType == "CREATE")] | length' "${BROADCAST_FILE}")"

          {
            echo "## Contract Deployment Result"
            echo ""
            echo "- Environment: \`${ENVIRONMENT}\`"
            echo "- Network: \`${NETWORK}\` (chain id: \`${CHAIN_ID}\`)"
            echo "- Script: \`DeployWerewolf.s.sol:DeployWerewolf\`"
            echo "- Create tx count: \`${CREATE_COUNT}\`"
            echo "- Verify enabled: \`${VERIFY_ENABLED}\`"
            echo ""
            echo "| Contract | Address | Tx |"
            echo "|---|---|---|"
          } >> "${GITHUB_STEP_SUMMARY}"

          jq -r '
            .transactions[]
            | select(.transactionType == "CREATE")
            | "| \(.contractName) | `\(.contractAddress)` | [link](https://sepolia.etherscan.io/tx/\(.hash)) |"
          ' "${BROADCAST_FILE}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload contract deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-deploy-${{ env.NETWORK }}-${{ github.run_id }}
          path: |
            packages/foundry/broadcast/DeployWerewolf.s.sol
            packages/foundry/deployments

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [prepare-groth16, deploy-contracts]
    if: ${{ github.event.inputs.skip_aws_deploy != 'true' && github.event.inputs.skip_terraform != 'true' && (needs.deploy-contracts.result == 'success' || needs.deploy-contracts.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Setup SOPS
        uses: mdgreenwald/mozilla-sops-action@v1.6.0

      - name: Terraform Init
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform apply -auto-approve

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [prepare-groth16, deploy-contracts, terraform]
    if: ${{ github.event.inputs.skip_aws_deploy != 'true' && (needs.deploy-contracts.result == 'success' || needs.deploy-contracts.result == 'skipped') && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Groth16 artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare-groth16.outputs.artifact_name }}
          path: .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Setup SOPS
        uses: mdgreenwald/mozilla-sops-action@v1.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push to ECR
        run: ./scripts/deploy-to-ecr.sh "${ENVIRONMENT}" "${SERVICE}"

  update-ecs:
    name: Update ECS Services
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: ${{ github.event.inputs.skip_aws_deploy != 'true' && needs.build-and-push.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Setup SOPS
        uses: mdgreenwald/mozilla-sops-action@v1.6.0

      - name: Terraform Init
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Update ECS Services
        run: ./scripts/update-ecs-service.sh "${ENVIRONMENT}" "${SERVICE}" --wait
