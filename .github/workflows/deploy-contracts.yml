name: Deploy Contracts

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment (for secrets/protection rules)"
        required: true
        default: "staging"
        type: choice
        options:
          - dev
          - staging
          - prod
      network:
        description: "Foundry RPC endpoint key from foundry.toml"
        required: true
        default: "sepolia"
        type: choice
        options:
          - sepolia
      script_file:
        description: "Script file under packages/foundry/script"
        required: true
        default: "DeployWerewolf.s.sol"
        type: string
      script_contract:
        description: "Contract name inside the script file"
        required: true
        default: "DeployWerewolf"
        type: string
      verify:
        description: "Verify contracts on explorer"
        required: true
        default: false
        type: boolean
      prepare_groth16:
        description: "Run Groth16 setup and verifier export before deploy"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-contracts-${{ github.event.inputs.environment }}-${{ github.event.inputs.network }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.network }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    defaults:
      run:
        working-directory: packages/foundry
    env:
      NETWORK: ${{ github.event.inputs.network }}
      SCRIPT_FILE: ${{ github.event.inputs.script_file }}
      SCRIPT_CONTRACT: ${{ github.event.inputs.script_contract }}
      VERIFY_ENABLED: ${{ github.event.inputs.verify }}
      ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        if: ${{ github.event.inputs.prepare_groth16 == 'true' }}
        uses: ./.github/actions/setup-rust

      - name: Prepare Groth16 artifacts
        if: ${{ github.event.inputs.prepare_groth16 == 'true' }}
        working-directory: .
        run: |
          set -euo pipefail
          make groth16-setup
          make groth16-export-verifier

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [[ -z "${ALCHEMY_API_KEY}" ]]; then
            echo "::error::Missing secret ALCHEMY_API_KEY"
            exit 1
          fi
          if [[ -z "${DEPLOYER_PRIVATE_KEY}" ]]; then
            echo "::error::Missing secret DEPLOYER_PRIVATE_KEY"
            exit 1
          fi
          if [[ "${VERIFY_ENABLED}" == "true" && -z "${ETHERSCAN_API_KEY}" ]]; then
            echo "::error::Missing secret ETHERSCAN_API_KEY (required when verify=true)"
            exit 1
          fi

      - name: Deploy contracts
        run: |
          set -euo pipefail
          ARGS=(
            script
            "script/${SCRIPT_FILE}:${SCRIPT_CONTRACT}"
            --rpc-url "${NETWORK}"
            --broadcast
            --legacy
            --ffi
            --private-key "${DEPLOYER_PRIVATE_KEY}"
          )

          if [[ "${VERIFY_ENABLED}" == "true" ]]; then
            ARGS+=(--verify --etherscan-api-key "${ETHERSCAN_API_KEY}")
          fi

          forge "${ARGS[@]}"

      - name: Summarize deployment
        run: |
          set -euo pipefail
          CHAIN_ID="$(cast chain-id --rpc-url "${NETWORK}")"
          BROADCAST_FILE="broadcast/${SCRIPT_FILE}/${CHAIN_ID}/run-latest.json"

          if [[ ! -f "${BROADCAST_FILE}" ]]; then
            echo "::error::Deployment broadcast file not found: ${BROADCAST_FILE}"
            exit 1
          fi

          EXPLORER_BASE=""
          if [[ "${NETWORK}" == "sepolia" ]]; then
            EXPLORER_BASE="https://sepolia.etherscan.io"
          fi

          CREATE_COUNT="$(jq '[.transactions[] | select(.transactionType == "CREATE")] | length' "${BROADCAST_FILE}")"

          {
            echo "## Contract Deployment Result"
            echo ""
            echo "- Environment: \`${{ github.event.inputs.environment }}\`"
            echo "- Network: \`${NETWORK}\` (chain id: \`${CHAIN_ID}\`)"
            echo "- Script: \`${SCRIPT_FILE}:${SCRIPT_CONTRACT}\`"
            echo "- Create tx count: \`${CREATE_COUNT}\`"
            echo "- Verify enabled: \`${VERIFY_ENABLED}\`"
            echo ""
            echo "| Contract | Address | Tx |"
            echo "|---|---|---|"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ -n "${EXPLORER_BASE}" ]]; then
            jq -r --arg explorer "${EXPLORER_BASE}" '
              .transactions[]
              | select(.transactionType == "CREATE")
              | "| \(.contractName) | `\(.contractAddress)` | [link](\($explorer)/tx/\(.hash)) |"
            ' "${BROADCAST_FILE}" >> "${GITHUB_STEP_SUMMARY}"
          else
            jq -r '
              .transactions[]
              | select(.transactionType == "CREATE")
              | "| \(.contractName) | `\(.contractAddress)` | `\(.hash)` |"
            ' "${BROADCAST_FILE}" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-deploy-${{ github.event.inputs.network }}-${{ github.run_id }}
          path: |
            packages/foundry/broadcast/${{ github.event.inputs.script_file }}
            packages/foundry/deployments
