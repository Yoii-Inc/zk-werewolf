name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "packages/**"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          node-version: lts/*

        
      # ---- Rust / wasm-pack を用意 ----
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./packages/mpc-algebra-wasm

      - name: Install wasm-pack
        run: cargo install wasm-pack

      # ---- Rust → WASM を先にビルド（型定義 .d.ts もここで生成）----
      - name: Build wasm (wasm-pack)
        working-directory: ./packages/mpc-algebra-wasm
        run: |
          wasm-pack build \
            --release \
            --target web \
            --out-dir pkg-web
            
      - name: Install foundry-toolchain
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Generate Groth16 verifier artifacts
        run: make groth16-setup

      - name: Start foundry node
        run: |
          yarn chain > /tmp/anvil.log 2>&1 &
          echo $! > /tmp/anvil.pid
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/8545) >/dev/null 2>&1; then
              echo "Anvil is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Failed to start Anvil within timeout"
          cat /tmp/anvil.log || true
          exit 1

      - name: Deploy contracts on localhost (and generate contract TS output)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: yarn deploy --network localhost

      - name: Stop foundry node
        if: always()
        run: |
          if [ -f /tmp/anvil.pid ]; then
            kill "$(cat /tmp/anvil.pid)" || true
          fi

      - name: Run nextjs lint
        run: yarn next:lint

      - name: Check typings on nextjs
        run: yarn next:check-types
